name: publish

on:
  push:
    branches: [main]
    paths:
      - "scripts/**.json"
      - "config.json"
      - "tools/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-latest
        ports:
          - 50021:50021
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk
          pip install -q requests pydub mutagen pillow edge-tts

      - name: Wait for VOICEVOX Engine
        run: |
          for i in $(seq 1 80); do
            if curl -sf http://localhost:50021/version > /dev/null; then
              echo "VOICEVOX Engine is up"
              exit 0
            fi
            sleep 3
          done
          echo "VOICEVOX Engine did not start in time"
          exit 1

      - name: Synthesize episodes
        run: python tools/synthesize.py

      - name: Generate cover art (if missing)
        run: python tools/make_cover.py

      - name: Build RSS feeds & site
        run: python tools/build_feed.py

      - name: Commit & push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "publish: episode audio & feeds [skip ci]"
          git pull --rebase origin main
          git push origin main
